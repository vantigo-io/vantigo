# git-cliff configuration — used for both semver bump computation
# (git-cliff --bumped-version) and release notes generation.
# https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% if version %}## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^build|^ci", group = "<!-- 6 -->Build & CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore|^style", group = "<!-- 7 -->Miscellaneous" },
  { message = ".*", group = "<!-- 8 -->Other" },
]

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
# Pre-1.0: keep breaking changes on minor bumps
initial_tag = "v0.1.0"
