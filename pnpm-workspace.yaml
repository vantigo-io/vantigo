  '@commitlint/cli': ^21.2.1
  '@commitlint/config-conventional': ^21.2.0
  '@types/pg': ^8.20.0
  dotenv: ^17.4.2
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.2
  lefthook: ^2.1.10
  next: 16.2.10
  react: 19.2.4
  react-dom: 19.2.4
  pg: ^8.22.0
