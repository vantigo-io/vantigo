name: 🚀 Continuous Delivery

on:
  push:
    branches:
      - main

jobs:
  release-manager:
    name: 🏷️ Manage Automated SemVer & Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: 🤖 Run Release Please Engine
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node

  compile-and-publish:
    name: ⚙️  Cross-Compile & Bake Container
    needs: release-manager
    if: ${{ needs.release-manager.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-manager.outputs.tag_name }}

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 📥 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🏭 Cross-Compile Standalone Binaries
        run: bun --filter idp compile:all

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/idp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/vantigo-io/vantigo-idp:latest,ghcr.io/vantigo-io/vantigo-idp:${{ needs.release-manager.outputs.tag_name }}
